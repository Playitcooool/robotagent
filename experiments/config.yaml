# 实验配置文件
# 用于配置外部LLM Judge的API参数

# ============================================
# 外部LLM Judge配置 (DeepSeek)
# ============================================
judge:
  # API Base URL
  api_base: "https://api.deepseek.com"

  # API Key
  api_key: "sk-84b123d32362456fba92ceb8525516b8"

  # 模型名称: deepseek-chat, deepseek-coder
  model: "deepseek-chat"

  # 请求超时时间（秒）
  timeout: 120

  # 最大重试次数
  max_retries: 3

# ============================================
# 数据路径配置
# ============================================
paths:
  # 轨迹数据
  trajectories: "../trajectories.jsonl"

  # 输出目录
  output_dir: "results"
