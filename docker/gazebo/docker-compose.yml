version: "3.8"

services:
  gazebo-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../../mcp:/app/mcp
    working_dir: /app/mcp
    environment:
      - TZ=UTC
      - ROS_DOMAIN_ID=0
      - GAZEBO_BUILTIN_MODEL_ROOT=/app/mcp/assets/gazebo_models
      - GAZEBO_MODEL_PATH=/app/mcp/assets/gazebo_models:/opt/gazebo_models/osrf:/usr/share/gazebo-11/models
    ports:
      - "8002:8002"
    tty: true
    command:
      - /bin/bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        python3 gazebo_mcp_server.py
