version: "3.8"

services:
  pybullet-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../../mcp:/app/mcp
    working_dir: /app/mcp
    environment:
      - TZ=UTC
      - PYBULLET_STREAM_DIR=/app/mcp/.sim_stream
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=localhost,127.0.0.1
      - no_proxy=localhost,127.0.0.1
    tty: true
    ports:
      - "127.0.0.1:18001:8000"
    command: ["python", "mcp_server.py"]
